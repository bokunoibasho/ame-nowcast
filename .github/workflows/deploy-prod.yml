name: Deploy production

# main へのマージ（push）で本番サイトを gh-pages ブランチの root へ公開する。
# 手動でも流せるよう workflow_dispatch も用意。
# プレビュー（/preview/*）は keep_files で消さずに保持する。
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # peaceiris が gh-pages ブランチへ push するため

concurrency:
  group: pages-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Publish to gh-pages root
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          keep_files: true            # /preview/* を消さない
          exclude_assets: '.github'   # ワークフロー定義は配信しない
          commit_message: "deploy(prod): ${{ github.sha }}"

      - name: Summary
        run: |
          echo "本番: https://bokunoibasho.github.io/ame-nowcast/" >> "$GITHUB_STEP_SUMMARY"
